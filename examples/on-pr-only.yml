# .github/workflows/eval.yml
#
# Eval only on PR, skip pushes to main. The lockfile is updated as
# part of the merge so post-merge runs aren't needed.
on:
  pull_request:
    paths: [src/**, evals/**]

jobs:
  eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: multivon-ai/eval-action@v1
        with:
          suite: evals/production.py
          comment-mode: replace
          fail-on: PR_NEEDS_REWORK
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
